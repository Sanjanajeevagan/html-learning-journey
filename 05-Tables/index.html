<!DOCTYPE html>
<html>

<head>
    <title>HTML Tables</title>
</head>

<body>

    <h1>HTML Tables</h1>

    <p>This page demonstrates how to create a table using HTML.</p>

    <hr>

    <table border="1" cellpadding="8">

        <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Year</th>
        </tr>

        <tr>
            <td>Sanjana</td>
            <td>AI & DS</td>
            <td>III</td>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>CSE</td>
            <td>II</td>
        </tr>

        <tr>
            <td>Priya</td>
            <td>ECE</td>
            <td>IV</td>
        </tr>

    </table>

</body>

</html>
