<!DOCTYPE html>
<html>

<head>
    <title>Links and Images</title>
</head>

<body>

    <h1>HTML Links and Images</h1>

    <p>
        This page demonstrates the use of hyperlinks and images in HTML.
    </p>

    <hr>

    <h2>Hyperlinks</h2>

    <p>Visit the following websites:</p>

    <a href="https://www.google.com">Google</a><br><br>

    <a href="https://github.com">GitHub</a><br><br>

    <a href="https://www.linkedin.com">LinkedIn</a>

    <hr>

    <h2>Images</h2>

    <img src="https://picsum.photos/300/180"
         alt="Sample Image"
         width="300"
         height="180">

    <p>
        The image above is displayed using the HTML img tag.
    </p>

</body>

</html>
