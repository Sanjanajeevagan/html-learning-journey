<!DOCTYPE html>
<html>

<head>
    <title>HTML Lists</title>
</head>

<body>

    <h1>HTML Lists</h1>

    <p>HTML provides different types of lists to organize information clearly.</p>

    <hr>

    <h2>Ordered List</h2>

    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h2>Unordered List</h2>

    <ul>
        <li>Python</li>
        <li>Java</li>
        <li>C</li>
    </ul>

    <h2>Description List</h2>

    <dl>
        <dt>HTML</dt>
        <dd>HyperText Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>

        <dt>JavaScript</dt>
        <dd>Programming language for web pages</dd>
    </dl>

</body>

</html>
