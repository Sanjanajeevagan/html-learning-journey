<!DOCTYPE html>
<html>

<head>
    <title>Feedback Form</title>
</head>

<body>

    <h1>Feedback Form</h1>

    <form>

        Name:
        <input type="text"><br><br>

        Email:
        <input type="email"><br><br>

        Feedback:

        <br>

        <textarea rows="5" cols="35"></textarea>

        <br><br>

        Rating:

        <select>

            <option>Excellent</option>

            <option>Good</option>

            <option>Average</option>

            <option>Poor</option>

        </select>

        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>

</html>
